services:
  cinematch:
    image: ghcr.io/biker2000on/cinematch:latest
    container_name: cinematch
    env_file: .env
    environment:
      - PORT=8585
      - RADARR_URL=http://radarr:7878
      - JELLYFIN_URL=http://jellyfin:8096
      - PLEX_URL=http://192.168.4.132:32400
    volumes:
      - /mnt/docker/volumes/cinematch:/data
    ports:
      - "8585:8585"
    networks:
      - mediacenter
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=false

  # Throwaway Radarr for validating list import — run with: docker compose --profile test up -d
  radarr-test:
    image: linuxserver/radarr:latest
    container_name: radarr-test
    profiles: ["test"]
    environment:
      - PUID=3000
      - PGID=3000
      - TZ=America/New_York
    volumes:
      - /mnt/docker/volumes/cinematch-test/radarr:/config
      - /mnt/docker/volumes/cinematch-test/movies:/movies
    ports:
      - "7879:7878"
    networks:
      - mediacenter
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=false

networks:
  mediacenter:
    external: true
    name: mediacenter
